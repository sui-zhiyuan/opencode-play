# ── Conflict Log ──────────────────────────────────────────────

[[conflicts]]
key = "Ctrl+E"
original = "Emacs end-of-line, JetBrains Recent Files"
resolution = "end-of-line → Alt+E; Recent Files → use Ctrl+G Ctrl+F or Search Everywhere"

[[conflicts]]
