# ── Design Constraints ────────────────────────────────────────

constraints = [
    "No F1-F12 keys (HHKB layout)",
    "No Home/End/PgUp/PgDn (HHKB layout)",
    "No Ctrl+H/J/K/L as chords prefix or chords second stroke (AHK intercept)",
    "Ctrl+K not used as chords prefix",
    "All Git operations through terminal CLI — no GUI Git shortcuts",
    "Chords second stroke: prefer Ctrl+key format",
    "Double-press self-reference for preserved prefix functions",
    "Modifier layers: Ctrl=primary, Ctrl+Shift=wider scope, Ctrl+Alt=advanced/structural",
]
