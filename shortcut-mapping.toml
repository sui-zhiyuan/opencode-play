# Universal Keyboard Shortcut Mapping
# Generated: 2026-07-20
# Format: TOML — structured, human-readable, key-value native
# Target Editors: VS Code, JetBrains, Zed, Atom, Sublime Text
# Keyboard: HHKB (no F1-F12, no Home/End/PgUp/PgDn)

[meta]
keyboard = "HHKB"
system_remap = "AutoHotKey"
chord_convention = "second-stroke-prefers-ctrl"

[meta.modifiers]
ctrl = "primary, local, high-frequency"
ctrl_shift = "same family, wider scope"
ctrl_alt = "advanced, structural, less frequent"

# ── Key Partition ─────────────────────────────────────────────

[key_partition]

[key_partition.universal]
keys = ["Ctrl+A", "Ctrl+S", "Ctrl+Z", "Ctrl+X", "Ctrl+C", "Ctrl+V",
        "Ctrl+F", "Ctrl+N", "Ctrl+P"]
note = "never remap — universal muscle memory"

# Removed from universal:
#   Ctrl+O → use Ctrl+P (Quick Open) to open files instead
#   Ctrl+Tab → use Ctrl+P (Quick Open) to switch tabs instead

[key_partition.direction]
layer = "system"
engine = "AutoHotKey"

[key_partition.direction.mapping]
"Ctrl+H" = "left"
"Ctrl+J" = "down"
"Ctrl+K" = "up"
"Ctrl+L" = "right"

ahk_snippet = '''
#Requires AutoHotkey v2.0
#UseHook
^h::Send "{Blind}{Left}"
^j::Send "{Blind}{Down}"
^k::Send "{Blind}{Up}"
^l::Send "{Blind}{Right}"
'''


[[key_partition.chords_prefixes]]
key = "Ctrl+E"
category = "code_editing"

[[key_partition.chords_prefixes]]
key = "Ctrl+W"
category = "window_view"

[[key_partition.chords_prefixes]]
key = "Ctrl+R"
category = "run_debug"

[[key_partition.chords_prefixes]]
key = "Ctrl+G"
category = "navigation"

[[key_partition.chords_prefixes]]
key = "Ctrl+T"
category = "refactoring"

[[key_partition.search]]
key = "Ctrl+F"
function = "find_in_file"

[[key_partition.search]]
key = "Ctrl+Shift+F"
function = "find_in_project"

[[key_partition.hhkb_nav]]
key = "Ctrl+A"
function = "line_start"

[[key_partition.hhkb_nav]]
key = "Alt+E"
function = "line_end"
note = "replaces Ctrl+E (now chords prefix)"

[[key_partition.hhkb_nav]]
key = "Alt+B"
function = "word_left"

[[key_partition.hhkb_nav]]
key = "Alt+F"
function = "word_right"

[[key_partition.hhkb_nav]]
key = "Alt+<"
function = "file_start"

[[key_partition.hhkb_nav]]
key = "Alt+>"
function = "file_end"

[[key_partition.unavailable]]
keys = ["Ctrl+H", "Ctrl+J", "Ctrl+K", "Ctrl+L"]
reason = "AutoHotKey direction keys — do not use for shortcuts or chords second stroke"

[[key_partition.unavailable]]
keys = ["Ctrl+K"]
reason = "also not available as chords prefix"

[[key_partition.unavailable]]
keys = ["Ctrl+Q", "Ctrl+M", "Ctrl+U", "Ctrl+D", "Ctrl+Y"]
reason = "severe cross-editor conflicts — left untouched"

